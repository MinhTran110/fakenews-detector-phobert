[pytest]
# ── Pytest configuration ──────────────────────────────────────────────────────
testpaths        = tests
python_files     = test_*.py
python_classes   = Test*
python_functions = test_*

# asyncio mode cho test async (scraper, API)
asyncio_mode = auto

# Markers để chạy subset test
markers =
    unit: Kiểm thử đơn vị (không cần network, không cần model thật)
    integration: Kiểm thử tích hợp (có thể cần file CSV, patch nhiều module)
    slow: Test chạy lâu (training end-to-end)

# Output format
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    -p no:cacheprovider

# Bỏ qua thư mục không cần thiết
norecursedirs = .git __pycache__ node_modules .venv venv checkpoints data logs
